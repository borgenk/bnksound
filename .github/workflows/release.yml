name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # The release tarball is named from the Cargo.toml version, and
      # install.sh fetches it by the release tag. A mismatch would publish
      # an asset the installer cannot find, so fail fast before building.
      - name: Verify tag matches Cargo.toml version
        run: |
          cargo_version="v$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          if [ "$cargo_version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-4-dev \
            libwayland-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            clang \
            libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release tarball
        run: make build-linux

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true
